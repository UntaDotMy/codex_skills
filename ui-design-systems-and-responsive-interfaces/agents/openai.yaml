# Reasoning: Follow the workspace default reasoning baseline so this skill
# inherits the same high effort as the main agent with no separate override.
reasoning_effort: "high"
interface:
  display_name: "UI Design Systems and Responsive Interfaces"
  short_description: "Analysis-first UI systems, responsive design, and accessibility guidance"
  default_prompt: "Use $ui-design-systems-and-responsive-interfaces when the main risk is visual hierarchy, layout structure, component composition, responsive behavior, accessibility execution, or design-token drift. Start from a working brief and produce a design intelligence packet before exploring; prefer scripts/design_intelligence.py when helpful. If UX is also involved, UI owns layout, hierarchy, components, tokens, states, and accessibility translation while UX owns journey, research, and experiment logic. Resolve workspace-scoped memory and any shared freshness-aware research cache before broad memory or research. Use request_user_input when business intent stays ambiguous after repo/runtime inspection. Use Storybook, Ladle, or Histoire. Research current external information before trusting internal knowledge when product-family benchmarks, platform guidance, or accessibility expectations may have changed. When validation exposes another in-scope gap, keep iterating in the same turn until the flow is clean or truly blocked. Route tool work in this Codex runtime through js_repl with codex.tool(...). If a required sub-agent is used, keep the handoff bounded, reuse the same-role agent for the same workstream, avoid interrupt=true unless the user explicitly redirects or cancels, and wait for terminal state before finalizing. Keep the result implementation-ready. Reconcile every explicit user requirement before finalizing; status requests are checkpoints, not stop signals, and do not present unresolved work as complete. State what is verified, inferred, and still blocked or unvalidated."
policy:
  allow_implicit_invocation: true
