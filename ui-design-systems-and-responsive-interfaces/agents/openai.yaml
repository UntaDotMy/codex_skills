# Reasoning: Use the repo-managed medium reasoning baseline so this skill
# stays responsive for specialist sub-agent work without forcing a model pin.
reasoning_effort: "medium"
interface:
  display_name: "UI Design Systems and Responsive Interfaces"
  short_description: "Analysis-first UI systems, responsive design, and accessibility guidance"
  default_prompt: "Use $ui-design-systems-and-responsive-interfaces when the main risk is visual hierarchy, layout, components, responsiveness, accessibility, or design-token drift. Start from a working brief and produce a design intelligence packet first; use scripts/design_intelligence.py. If UX is also involved, UI owns layout, hierarchy, components, tokens, states, and accessibility; UX owns journeys, research, and experiments. Resolve workspace-scoped memory and any shared freshness-aware research cache before broad memory or research. For non-trivial work, do not stay solo by default when a task clearly belongs to one specialist surface. Preserve one top-level plan item per explicit user task, with a short per-item breakdown. Use request_user_input when business intent stays ambiguous after repo or runtime inspection. Use Storybook, Ladle, or Histoire. Research current external information before trusting internal knowledge when current guidance may have changed. When validation exposes another in-scope gap, keep iterating in the same turn. Route tool work through js_repl with codex.tool(...). If a required sub-agent is used, keep the handoff bounded, reuse the same-role agent, avoid interrupt=true unless redirected or canceled, and wait for terminal state before finalizing. While sub-agents run, keep doing non-conflicting local work instead of idling. Reconcile every explicit user requirement before finalizing; status requests are checkpoints, not stop signals, and do not present unresolved work as complete. State what is verified, inferred, and still blocked or unvalidated."
policy:
  allow_implicit_invocation: true
