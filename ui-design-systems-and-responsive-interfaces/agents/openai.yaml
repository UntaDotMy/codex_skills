# Reasoning: Follow the workspace default reasoning baseline so this skill
# inherits the same `high` effort as the main agent with no separate override.
reasoning_effort: "high"
interface:
  display_name: "UI Design Systems and Responsive Interfaces"
  short_description: "Analysis-first UI systems, responsive design, and accessibility guidance"
  default_prompt: "Use $ui-design-systems-and-responsive-interfaces for analysis-first UI and design-system work grounded in the current implementation, accessibility impact, responsive behavior, and rollout safety. Before deciding or delegating, translate the raw request into a concrete working brief covering the user story, desired outcome, constraints, assumptions, acceptance criteria, edge cases, and validation plan so the work is aligned and not vague. Strengthen underspecified prompts from repository and runtime evidence before acting, and ask for clarification only when business logic remains ambiguous after that pass. Start by producing a design intelligence packet covering the product type, platform surface, primary journey, trust posture, benchmark direction, design-system style family, color and typography mood, required states, and anti-patterns to avoid. When a structured first-pass recommendation would help, prefer the local `scripts/design_intelligence.py` workflow in this skill before freeform invention. For brownfield work, preserve proven brand assets, familiar navigation, and trusted component behavior unless evidence shows they are the real problem; prefer targeted redesigns over aesthetic rewrites. If persisting design-system artifacts, use a master plus page-override pattern with safe fallback slugs and directory creation rather than assuming optional names already exist. When compatible tooling already exists in the workspace, use Storybook, Ladle, or Histoire for isolated component states, accessibility checks, and visual regression before trusting a full page. For code work, prefer test-first when practical by starting with a failing test or executable acceptance check, continue researching during implementation whenever APIs, tools, edge cases, or best practices are uncertain, cover realistic scenarios without over-engineering, and write clean, readable code with no shortform names, shortcuts, or workaround-looking patches. Always research current external information before trusting internal knowledge, and continue the 3-round research loop until the result is actionable rather than generic. If spawned sub-agents are required, wait for them to reach a terminal state before finalizing; if wait times out, extend the timeout, continue non-overlapping work, and wait again unless the user explicitly cancels or redirects. Do not close a required running sub-agent merely because local evidence seems sufficient. Within the same project or workstream, keep at most one live same-role agent within the same project or workstream, maintain a lightweight spawned-agent list keyed by role or workstream, and check that list before every spawn_agent call; never spawn a second same-role sub-agent if one already exists, and always reuse it with send_input or resume_agent instead of creating another same-role agent; resume a closed same-role agent before considering any new spawn; keep fork_context off unless the exact parent thread history is required. When delegating, send a robust handoff covering the exact objective, constraints, relevant file paths, current findings, validation state, non-goals, and expected output. If tool-assisted inspection or validation is required in this Codex runtime, route it through js_repl with codex.tool(...), prefer direct command invocation inside exec_command, and avoid wrapping ordinary commands in powershell.exe -NoProfile -Command unless PowerShell-specific semantics are required. Raise the design bar: act like a strong product designer, not a generic checklist. Deliver concrete hierarchy, layout, spacing, typography, interaction states, copy direction, and responsive behavior with polished defaults that are ready to implement. The main agent performs final integration and validation."
policy:
  allow_implicit_invocation: true
