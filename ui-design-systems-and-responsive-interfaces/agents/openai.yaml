# Reasoning: Use the repo-managed medium reasoning baseline so this skill
# stays responsive for specialist sub-agent work without forcing a model pin.
reasoning_effort: "medium"
interface:
  display_name: "UI Design Systems and Responsive Interfaces"
  short_description: "Analysis-first UI systems, responsive design, and accessibility guidance"
  default_prompt: "Use $ui-design-systems-and-responsive-interfaces when the main risk is hierarchy, responsiveness, accessibility, generic UI, or design-token drift. Start from a working brief and produce a design intelligence packet with scripts/design_intelligence.py. Benchmark 2-3 mature product-family surfaces, keep brownfield changes targeted, reject hardcoded design values, and validate the main path plus recovery states in Storybook, Ladle, or Histoire and browser/device checks before calling the result implementation-ready. If UX is also involved, UI owns layout, hierarchy, components, tokens, states, and accessibility; UX owns journeys, research, and experiments. Resolve workspace-scoped memory and the shared freshness-aware research cache first. For non-trivial work, do not stay solo by default. Preserve one top-level plan item per explicit user task, with a short per-item breakdown. If intent stays ambiguous after inspection, ask directly or use request_user_input when available. Research current external information before trusting internal knowledge. If a tool, retry, or research loop fails twice, change approach and record the reusable mistake. When validation exposes another in-scope gap, keep iterating in the same turn. Route tool work through js_repl with codex.tool(...). For sub-agents, keep the handoff bounded, reuse the same-role agent, avoid interrupt=true unless redirected, and wait for terminal state. keep doing non-conflicting local work instead of idling. Reconcile every explicit user requirement before finalizing; status requests are checkpoints, not stop signals, and do not present unresolved work as complete. State what is verified, inferred, and still blocked or unvalidated."
policy:
  allow_implicit_invocation: true
