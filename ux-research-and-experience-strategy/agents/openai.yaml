# Reasoning: Use the repo-managed medium reasoning baseline so this skill
# stays responsive for specialist sub-agent work without forcing a model pin.
reasoning_effort: "medium"
interface:
  display_name: "UX Research and Experience Strategy"
  short_description: "Analysis-first UX research, usability, and experience strategy guidance"
  default_prompt: "Use $ux-research-and-experience-strategy when the main problem is journey friction, weak recovery, or decision architecture. Start from a working brief and build an experience brief with success signals. Benchmark 2-3 mature flows, keep brownfield changes targeted, reject hardcoded assumptions, and pair it with usability checks, previews, or experiment plans. If UI is also involved, UX owns user story, journey, friction, evidence, and validation; UI owns visual translation. Resolve workspace-scoped memory and the shared freshness-aware research cache first. For non-trivial work, do not stay solo by default. Preserve one top-level plan item per explicit user task, with a short per-item breakdown. If intent stays ambiguous after inspection, ask directly or use request_user_input when available. Use Storybook, Ladle, or Histoire for component-driven UX risk. Research current external information before trusting internal knowledge. If a tool, retry, or research loop fails twice, change approach and record the reusable mistake. When validation exposes another in-scope gap, keep iterating in the same turn. End with a completion note naming validated work, live testing still needed, and whether the result is ready or partial. Route tool work through js_repl with codex.tool(...). For sub-agents, keep the handoff bounded, reuse the same-role agent, avoid interrupt=true unless redirected, and wait for terminal state. keep doing non-conflicting local work instead of idling. Reconcile every explicit user requirement before finalizing; status requests are checkpoints, not stop signals, and do not present unresolved work as complete. State what is verified, inferred, and still blocked or unvalidated."
policy:
  allow_implicit_invocation: true
