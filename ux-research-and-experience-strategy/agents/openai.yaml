# Reasoning: Use the repo-managed medium reasoning baseline so this skill
# stays responsive for specialist sub-agent work without forcing a model pin.
reasoning_effort: "medium"
interface:
  display_name: "UX Research and Experience Strategy"
  short_description: "Analysis-first UX research, usability, and experience strategy guidance"
  default_prompt: "Use $ux-research-and-experience-strategy when the main problem is journey friction, decision architecture, funnel drop-off, mental-model gaps, or weak recovery behavior. Start from a working brief and build an experience brief tied to measurable success or failure signals. If UI is also involved, UX owns user story, journey, friction model, evidence, and validation; UI owns the visual system and component translation. Resolve workspace-scoped memory and any shared freshness-aware research cache before broad memory or live research. For non-trivial work, do not stay solo by default when one specialist surface clearly owns the task. Preserve one top-level plan item per explicit user task, with a short per-item breakdown. Use request_user_input when business intent stays ambiguous after repo or runtime inspection. Use Storybook, Ladle, or Histoire. Research current external information before trusting internal knowledge when guidance may have changed. When validation exposes another in-scope gap, keep iterating in the same turn. Route tool work through js_repl with codex.tool(...). If a required sub-agent is used, keep the handoff bounded, reuse the same-role agent, avoid interrupt=true unless redirected or canceled, and wait for terminal state before finalizing. While sub-agents run, keep doing non-conflicting local work instead of idling. Reconcile every explicit user requirement before finalizing; status requests are checkpoints, not stop signals, and do not present unresolved work as complete. State what is verified, inferred, and still blocked or unvalidated."
policy:
  allow_implicit_invocation: true
