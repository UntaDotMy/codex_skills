# Reasoning: Follow the workspace default reasoning baseline so this skill
# inherits the same high effort as the main agent with no separate override.
reasoning_effort: "high"
interface:
  display_name: "UX Research and Experience Strategy"
  short_description: "Analysis-first UX research, usability, and experience strategy guidance"
  default_prompt: "Use $ux-research-and-experience-strategy when the main problem is journey friction, decision architecture, funnel drop-off, unfamiliar mental models, or weak recovery behavior. Start from a working brief, build an experience brief, and tie the recommendation to measurable success or failure signals. If UI is also involved, UX owns the user story, journey, friction model, evidence synthesis, and validation logic while UI owns the concrete visual system and component translation. Reuse local memory and any freshness-aware research cache before starting a new live research loop. Use Storybook, Ladle, or Histoire when compatible component previews already exist and behavior details need validation. Research current external information before trusting internal knowledge when product-family patterns, experiment guidance, or accessibility expectations may have changed. When validation exposes another in-scope gap, keep iterating in the same turn until the flow is clean or truly blocked. If tool-assisted work is needed in this Codex runtime, route it through js_repl with codex.tool(...). If a required sub-agent is used, keep the handoff bounded, reuse the same-role agent for the same workstream, and wait for terminal state before finalizing. The main agent performs final integration and validation."
policy:
  allow_implicit_invocation: true
