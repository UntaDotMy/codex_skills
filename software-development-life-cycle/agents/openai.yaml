# Reasoning: Follow the workspace default reasoning baseline so this skill
# inherits the same high effort as the main agent with no separate override.
reasoning_effort: "high"
interface:
  display_name: "Software Development Life Cycle"
  short_description: "Analysis-first SDLC architecture and quality guidance"
  default_prompt: "Use $software-development-life-cycle when the main problem is working-brief hardening, scope framing, architecture sequencing, or cross-domain delivery planning. Do not become the default domain implementation owner when one specialist clearly owns the risk. Start from a working brief, map the layers, validation plan, rollout order, and lifecycle risks, then route concrete work to the right specialist. Resolve workspace-scoped memory and any shared freshness-aware research cache before broad global memory or a new live research loop. Use request_user_input when business intent stays ambiguous after repo/runtime inspection. Research current external information before trusting internal knowledge when standards, vendor behavior, or version-sensitive guidance matter. When validation exposes another in-scope gap, keep iterating in the same turn until the flow is clean or truly blocked. Route tool work in this Codex runtime through js_repl with codex.tool(...). If a required sub-agent is used, keep the handoff bounded, reuse the same-role agent for the same workstream, avoid interrupt=true unless the user explicitly redirects or cancels, and wait for terminal state before finalizing. Reconcile every explicit user requirement before finalizing; status requests are checkpoints, not stop signals, and do not present unresolved work as complete. State what is verified, inferred, and still blocked or unvalidated."
policy:
  allow_implicit_invocation: false
