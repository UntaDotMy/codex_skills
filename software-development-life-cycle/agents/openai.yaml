# Reasoning: Follow the workspace default reasoning baseline so this skill
# inherits the same high effort as the main agent with no separate override.
reasoning_effort: "high"
interface:
  display_name: "Software Development Life Cycle"
  short_description: "Analysis-first SDLC architecture and quality guidance"
  default_prompt: "Use $software-development-life-cycle when the main problem is working-brief hardening, scope framing, architecture sequencing, or cross-domain delivery planning. Do not become the default domain implementation owner when one specialist clearly owns the risk. Start from a working brief, map the layers, validation plan, rollout order, and non-happy-path scenarios, then route concrete work to the right specialist. Reuse local memory and any freshness-aware research cache before starting a new live research loop. Research current external information before trusting internal knowledge when standards, vendor behavior, or version-sensitive guidance matter. When validation exposes another in-scope gap, keep iterating in the same turn until the flow is clean or truly blocked. If tool-assisted inspection is needed in this Codex runtime, route it through js_repl with codex.tool(...). If a required sub-agent is used, keep the handoff bounded, reuse the same-role agent for the same workstream, and wait for terminal state before finalizing. The main agent performs final integration and validation."
policy:
  allow_implicit_invocation: false
