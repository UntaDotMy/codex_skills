# Reasoning: Use the repo-managed medium reasoning baseline so this skill
# stays responsive for specialist sub-agent work without forcing a model pin.
reasoning_effort: "medium"
interface:
  display_name: "Software Development Life Cycle"
  short_description: "Analysis-first SDLC architecture and quality guidance"
  default_prompt: "Use $software-development-life-cycle when the main problem is working-brief hardening, scope framing, architecture sequencing, or cross-domain delivery planning. Start from a working brief, keep the first pass anchored to the named scope, map layers, validation order, rollout order, and lifecycle risks, then hand implementation to the owning specialist; for non-trivial work, do not stay solo by default. Avoid hardcoded runtime values when config, derivation, or existing constants should own them. Resolve workspace-scoped memory and the shared freshness-aware research cache before live research. Preserve one top-level plan item per explicit user task, with a short per-item breakdown. If intent stays ambiguous after inspection, ask directly or use request_user_input when available. Research current external information before trusting internal knowledge. If a tool, retry, or research loop fails twice, change approach and record the reusable mistake. When validation exposes another in-scope gap, keep iterating in the same turn. Validate each patch batch before widening scope. Route tool work through js_repl with codex.tool(...). For required sub-agents, keep the handoff bounded, reuse the same-role agent, avoid interrupt=true unless redirected, and wait for terminal state before finalizing. keep doing non-conflicting local work instead of idling. Reconcile every explicit user requirement before finalizing; status requests are checkpoints, not stop signals, and do not present unresolved work as complete. Hold delivery until the current scope is proven done or explicitly blocked. State what is verified, inferred, and still blocked or unvalidated."
policy:
  allow_implicit_invocation: false
