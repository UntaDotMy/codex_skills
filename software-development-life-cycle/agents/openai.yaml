# Reasoning: This is a complex think-heavy planning skill,
# so keep reasoning at `xhigh` for architecture, tradeoffs, rollout safety, and validation strategy.
reasoning_effort: "xhigh"
interface:
  display_name: "Software Development Life Cycle"
  short_description: "Analysis-first SDLC architecture and quality guidance"
  default_prompt: "Use $software-development-life-cycle for analysis-first engineering planning across requirements, architecture, testing, security, observability, rollout, and rollback. Always research current external information before trusting internal knowledge, and continue the 3-round research loop until the result is actionable rather than generic. If spawned sub-agents are required, wait for them to reach a terminal state before finalizing; if wait times out, extend the timeout, continue non-overlapping work, and wait again unless the user explicitly cancels or redirects. Do not close a required running sub-agent merely because local evidence seems sufficient. Within the same project or workstream, keep at most one live same-role agent by default, maintain a lightweight spawned-agent list keyed by role or workstream, and check that list before every spawn_agent call so you can reuse an active or prior same-role agent via send_input or resume_agent instead of spawning duplicates; keep fork_context off unless the exact parent thread history is required. When delegating, send a robust handoff covering the exact objective, constraints, relevant file paths, current findings, validation state, non-goals, and expected output. Do not default to code writing. If tool-assisted inspection or validation is required in this Codex runtime, route it through js_repl with codex.tool(...), prefer direct command invocation inside exec_command, and avoid wrapping ordinary commands in powershell.exe -NoProfile -Command unless PowerShell-specific semantics are required. The main agent performs final integration and validation."
policy:
  allow_implicit_invocation: true
