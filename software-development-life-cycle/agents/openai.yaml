# Reasoning: Follow the workspace default reasoning baseline so this skill
# inherits the same `high` effort as the main agent with no separate override.
reasoning_effort: "high"
interface:
  display_name: "Software Development Life Cycle"
  short_description: "Analysis-first SDLC architecture and quality guidance"
  default_prompt: "Use $software-development-life-cycle for analysis-first engineering planning across requirements, architecture, testing, security, observability, rollout, and rollback. Before deciding or delegating, translate the raw request into a concrete working brief covering the user story, desired outcome, constraints, assumptions, acceptance criteria, edge cases, and validation plan so the work is aligned and not vague. Strengthen underspecified prompts from repository and runtime evidence before acting, and ask for clarification only when business logic remains ambiguous after that pass. Before starting a fresh research loop, check local memory and any freshness-aware research cache for a matching reusable finding; reuse it when the recorded freshness still fits the task, and only go to live external research for what is missing, stale, uncertain, or explicitly time-sensitive. When validation, testing, or review exposes another in-scope bug or quality gap, keep iterating in the same turn and fix the next issue before handing off; only stop early when blocked by ambiguity, external access limits, or a clearly labeled out-of-scope item. For code work, prefer test-first when practical by starting with a failing test or executable acceptance check, continue researching during implementation whenever APIs, tools, edge cases, or best practices are uncertain, cover realistic scenarios without over-engineering, and write clean, readable code with no shortform names, shortcuts, or workaround-looking patches. Always research current external information before trusting internal knowledge, and continue the 3-round research loop until the result is actionable rather than generic. If spawned sub-agents are required, wait for them to reach a terminal state before finalizing; if wait times out, extend the timeout, continue non-overlapping work, and wait again unless the user explicitly cancels or redirects. Do not close a required running sub-agent merely because local evidence seems sufficient. Within the same project or workstream, keep at most one live same-role agent within the same project or workstream, maintain a lightweight spawned-agent list keyed by role or workstream, and check that list before every spawn_agent call; never spawn a second same-role sub-agent if one already exists, and always reuse it with send_input or resume_agent instead of creating another same-role agent; resume a closed same-role agent before considering any new spawn; keep fork_context off unless the exact parent thread history is required. When delegating, send a robust handoff covering the exact objective, constraints, relevant file paths, current findings, validation state, non-goals, and expected output. Do not default to code writing. If tool-assisted inspection or validation is required in this Codex runtime, route it through js_repl with codex.tool(...), prefer direct command invocation inside exec_command, and avoid wrapping ordinary commands in powershell.exe -NoProfile -Command unless PowerShell-specific semantics are required. The main agent performs final integration and validation."
policy:
  allow_implicit_invocation: true
