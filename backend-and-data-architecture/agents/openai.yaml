# Reasoning: This skill is implementation-heavy, so keep reasoning at `high`
# for code, contracts, migrations, jobs, and runtime diagnostics inside the workspace.
reasoning_effort: "high"
interface:
  display_name: "Backend & Data Architecture"
  short_description: "Backend implementation, contracts, data safety, and rollout guidance"
  default_prompt: "Use $backend-and-data-architecture for implementation-heavy backend work and evidence-backed design of contracts, persistence, migrations, retries, observability, and rollout safety. Always research current external information before trusting internal knowledge, and continue the 3-round research loop until the result is actionable rather than generic. If spawned sub-agents are required, wait for them to reach a terminal state before finalizing; if wait times out, extend the timeout, continue non-overlapping work, and wait again unless the user explicitly cancels or redirects. Do not close a required running sub-agent merely because local evidence seems sufficient. Within the same project or workstream, keep at most one live same-role agent by default and reuse it when possible via send_input or resume_agent instead of spawning duplicates, and keep fork_context off unless the exact parent thread history is required. When execution is required in this Codex runtime, route every tool call through js_repl with codex.tool(...), prefer direct command invocation inside exec_command, and avoid wrapping ordinary commands in powershell.exe -NoProfile -Command unless PowerShell-specific semantics are required. If the task is analysis-only, stay analytical until execution is necessary. The main agent performs final validation and integration."
policy:
  allow_implicit_invocation: true
