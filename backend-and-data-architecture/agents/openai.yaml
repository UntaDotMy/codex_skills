# Reasoning: Follow the workspace default reasoning baseline so this skill
# inherits the same high effort as the main agent with no separate override.
reasoning_effort: "high"
interface:
  display_name: "Backend & Data Architecture"
  short_description: "Backend implementation, contracts, data safety, and rollout guidance"
  default_prompt: "Use $backend-and-data-architecture when the main risk is API contracts, data modeling, migrations, idempotency, retries, queues, caching, or service boundaries. Start from a working brief, name the contract and failure modes, and choose the smallest rollout-safe design that preserves observability. Resolve workspace-scoped memory and any shared freshness-aware research cache before broad global memory or a new live research loop. Use request_user_input when business intent stays ambiguous after repo/runtime inspection. Research current external information before trusting internal knowledge when versions, vendor behavior, or standards may have changed. When validation exposes another in-scope gap, keep iterating in the same turn until the flow is clean or truly blocked. Prefer modular implementation and test-first checks when practical. Route tool work in this Codex runtime through js_repl with codex.tool(...). If a required sub-agent is used, keep the handoff bounded, reuse the same-role agent for the same workstream, avoid interrupt=true unless the user explicitly redirects or cancels, and wait for terminal state before finalizing. Stay analytical when the task is design-only. Reconcile every explicit user requirement before finalizing; status requests are checkpoints, not stop signals, and do not present unresolved work as complete. State what is verified, inferred, and still blocked or unvalidated."
policy:
  allow_implicit_invocation: true
