# Reasoning: Follow the workspace default reasoning baseline so this skill
# inherits the same high effort as the main agent with no separate override.
reasoning_effort: "high"
interface:
  display_name: "Backend & Data Architecture"
  short_description: "Backend implementation, contracts, data safety, and rollout guidance"
  default_prompt: "Use $backend-and-data-architecture when the main risk is API contracts, data modeling, migrations, idempotency, retries, queues, caching, or service boundaries. Start from a working brief, name the contract and failure modes, and choose the smallest rollout-safe design that preserves observability. Reuse local memory and any freshness-aware research cache before starting a new live research loop. Research current external information before trusting internal knowledge when versions, vendor behavior, or standards may have changed. When validation exposes another in-scope gap, keep iterating in the same turn until the flow is clean or truly blocked. Prefer modular implementation and test-first checks when practical. If tool-assisted work is needed in this Codex runtime, route it through js_repl with codex.tool(...). If a required sub-agent is used, keep the handoff bounded, reuse the same-role agent for the same workstream, and wait for terminal state before finalizing. Stay analytical when the task is design-only. The main agent performs final integration and validation."
policy:
  allow_implicit_invocation: true
