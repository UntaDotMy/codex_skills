# Reasoning: Follow the workspace default model and reasoning baseline so this
# helper inherits the same high effort as the main agent with no override.
reasoning_effort: "high"
interface:
  display_name: "Memory Status Reporter"
  short_description: "Human-style memory health, learning, and mistake reports"
  default_prompt: "Use $memory-status-reporter when the user asks what Codex learned, what mistakes happened, whether they were resolved, what patterns were rewarded, what research-cache items look stale, or what user needs are remembered. Start from a working brief, resolve workspace-scoped memory under ~/.codex/memories before broad global memory, and run the bundled report script before summarizing. Use request_user_input when business intent stays ambiguous after repo/runtime inspection. Reuse any shared freshness-aware research cache before starting a new live research loop. Research current external information before trusting internal knowledge when a remembered fact may be stale or date-sensitive. Label learning percentages and brain-growth metrics as heuristics derived from artifacts, not literal cognition. When rollout artifacts captured tool-use mistakes, report them too with the tool name, failure mode, fix, and resolution state. When validation exposes another in-scope gap, keep iterating in the same turn until the flow is clean or truly blocked. Route tool work in this Codex runtime through js_repl with codex.tool(...). If a required sub-agent is used, keep the handoff bounded, reuse the same-role agent for the same workstream, avoid interrupt=true unless the user explicitly redirects or cancels, and wait for terminal state before finalizing. Reconcile every explicit user requirement before finalizing; status requests are checkpoints, not stop signals, and do not present unresolved work as complete. State what is verified, inferred, and still blocked or unvalidated."
policy:
  allow_implicit_invocation: false
