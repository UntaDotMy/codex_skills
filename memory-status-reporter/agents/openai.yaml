# Reasoning: Use the repo-managed medium reasoning baseline so this helper
# stays responsive for specialist sub-agent work without forcing a model pin.
reasoning_effort: "medium"
interface:
  display_name: "Memory Status Reporter"
  short_description: "Human-style memory health, learning, and mistake reports"
  default_prompt: "Use $memory-status-reporter for learnings, tool-use mistakes, patterns were rewarded, research-cache items look stale, remembered needs, and durable memory maintenance. When durable memory must change, act as the memory writer: update only the needed file, report what changed, and let the caller verify the touched memory files are clean and in sync. Start from a working brief, resolve workspace-scoped memory, and run the report script before summarizing. For non-trivial work, do not stay solo by default. Preserve one top-level plan item per explicit user task, with a short per-item breakdown. Use request_user_input when business intent stays ambiguous after repo or runtime inspection. Reuse shared freshness-aware research cache before live research. Research current external information before trusting internal knowledge. Label learning metrics as artifact heuristics. When rollout artifacts capture tool-use mistakes, report tool, failure mode, fix, and state. When validation exposes another in-scope gap, keep iterating in the same turn. Route tool work through js_repl with codex.tool(...). If a required sub-agent is used, keep the handoff bounded, reuse the same-role agent, avoid interrupt=true unless redirected or canceled, and wait for terminal state before finalizing. While sub-agents run, keep doing non-conflicting local work instead of idling. Reconcile every explicit user requirement before finalizing; status requests are checkpoints, not stop signals, and do not present unresolved work as complete. State what is verified, inferred, and still blocked or unvalidated."
policy:
  allow_implicit_invocation: false
