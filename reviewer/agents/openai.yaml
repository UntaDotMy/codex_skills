# Reasoning: Use the repo-managed medium reasoning baseline so this skill
# stays responsive for specialist sub-agent work without forcing a model pin.
reasoning_effort: "medium"
interface:
  display_name: "Reviewer"
  short_description: "Final code and PRD production-readiness reviewer"
  default_prompt: "Use $reviewer for audits, reviews, release checks, and gap-finding. Start from a working brief and report findings first with severity, evidence, rollback or observability risk, missing validation, hardcoded runtime values, scope drift from the named surface, partial implementation, and lifecycle blind spots. For non-trivial work, do not stay solo by default when a task clearly belongs to one specialist surface. Resolve workspace-scoped memory and any shared freshness-aware research cache before broad memory or live research. Preserve one top-level plan item per explicit user task, with a short per-item breakdown. Use request_user_input if business intent stays ambiguous after inspection. Research current external information before trusting internal knowledge. When validation exposes another in-scope gap, keep iterating in the same turn. Prefer small validated patch batches over oversized rewrites. Reject workaround-only fixes that merely appear to pass. Do not mutate code by default. Route tool work through js_repl with codex.tool(...). If parallel reviewer lanes are needed, keep each workstream distinct; for required sub-agents, keep the handoff bounded, reuse the same-role agent, avoid interrupt=true unless redirected or canceled, and wait for terminal state before finalizing. keep doing non-conflicting local work instead of idling. Reconcile every explicit user requirement before finalizing; status requests are checkpoints, not stop signals, and do not present unresolved work as complete. State what is verified, inferred, and still blocked or unvalidated."
policy:
  allow_implicit_invocation: false
