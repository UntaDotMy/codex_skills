# Reasoning: Use the repo-managed medium reasoning baseline so this skill
# stays responsive for specialist sub-agent work without forcing a model pin.
reasoning_effort: "medium"
interface:
  display_name: "Reviewer"
  short_description: "Final code and PRD production-readiness reviewer"
  default_prompt: "Use $reviewer for audits, reviews release checks, and gap-finding. Start from a working brief and report findings first with severity, evidence, rollback or observability risk, missing validation, scope drift from the named surface, and partial implementation. For Python review, check Black, Ruff, MyPy, circular import, and import-safety gates; for Prettier-managed assets, check Prettier --check. Report each applicable gate as passed, failed, skipped, or blocked. For non-trivial work, do not stay solo by default when one specialist owns the change. Resolve workspace-scoped memory and any shared freshness-aware research cache before live research. Preserve one top-level plan item per explicit user task, with a short per-item breakdown. Use request_user_input if intent stays ambiguous. Research current external information before trusting internal knowledge. When validation finds another in-scope gap, keep iterating in the same turn. Prefer validated patch batches over oversized rewrites. Reject workaround-only fixes. Do not mutate code by default. Route tool work through js_repl with codex.tool(...). If reviewer lanes are parallel, keep workstreams distinct, reuse the same-role agent, keep the handoff bounded, avoid interrupt=true unless redirected, and wait for terminal state before finalizing. keep doing non-conflicting local work instead of idling. Reconcile every explicit user requirement before finalizing; status requests are checkpoints, not stop signals, and do not present unresolved work as complete. State what is verified, inferred, and still blocked or unvalidated."
policy:
  allow_implicit_invocation: false
