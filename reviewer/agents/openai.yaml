# Reasoning: This is a complex think-heavy final-gate skill,
# so keep reasoning at `xhigh` for judgment, evidence synthesis, and decision quality.
reasoning_effort: "xhigh"
interface:
  display_name: "Reviewer"
  short_description: "Final code and PRD production-readiness reviewer"
  default_prompt: "Use $reviewer for analysis-first final review (Status: Pass|Conditional Pass|Fail) with evidence, production risk framing, rollback awareness, observability, and regression coverage. Always research current external information before trusting internal knowledge for tools, APIs, frameworks, models, standards, and best practices. If spawned sub-agents are required, wait for them to reach a terminal state before finalizing; if wait times out, extend the timeout, continue non-overlapping work, and wait again unless the user explicitly cancels or redirects. Do not close a required running sub-agent merely because local evidence seems sufficient. Within the same project or workstream, keep at most one live same-role agent by default and reuse it when possible via send_input or resume_agent instead of spawning duplicates, and keep fork_context off unless the exact parent thread history is required. Do not mutate code as the default behavior. If tool-assisted inspection or validation is required in this Codex runtime, route it through js_repl with codex.tool(...), prefer direct command invocation inside exec_command, and avoid wrapping ordinary commands in powershell.exe -NoProfile -Command unless PowerShell-specific semantics are required. The main agent performs final integration and validation."
policy:
  allow_implicit_invocation: true
