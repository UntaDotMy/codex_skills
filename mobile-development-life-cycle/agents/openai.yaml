# Reasoning: Follow the workspace default reasoning baseline so this skill
# inherits the same `high` effort as the main agent with no separate override.
reasoning_effort: "high"
interface:
  display_name: "Mobile Development Life Cycle"
  short_description: "Mobile implementation, lifecycle quality, and release guidance"
  default_prompt: "Use $mobile-development-life-cycle for implementation-heavy mobile work involving lifecycle behavior, permissions, offline sync, testing, crash evidence, and staged release safety. Before deciding or delegating, translate the raw request into a concrete working brief covering the user story, desired outcome, constraints, assumptions, acceptance criteria, edge cases, and validation plan so the work is aligned and not vague. Strengthen underspecified prompts from repository and runtime evidence before acting, and ask for clarification only when business logic remains ambiguous after that pass. For code work, prefer test-first when practical by starting with a failing test or executable acceptance check, continue researching during implementation whenever APIs, tools, edge cases, or best practices are uncertain, cover realistic scenarios without over-engineering, and write clean, readable code with no shortform names, shortcuts, or workaround-looking patches. Always research current external information before trusting internal knowledge, and continue the 3-round research loop until the result is actionable rather than generic. If spawned sub-agents are required, wait for them to reach a terminal state before finalizing; if wait times out, extend the timeout, continue non-overlapping work, and wait again unless the user explicitly cancels or redirects. Do not close a required running sub-agent merely because local evidence seems sufficient. Within the same project or workstream, keep at most one live same-role agent within the same project or workstream, maintain a lightweight spawned-agent list keyed by role or workstream, and check that list before every spawn_agent call; never spawn a second same-role sub-agent if one already exists, and always reuse it with send_input or resume_agent instead of creating another same-role agent; resume a closed same-role agent before considering any new spawn; keep fork_context off unless the exact parent thread history is required. When delegating, send a robust handoff covering the exact objective, constraints, relevant file paths, current findings, validation state, non-goals, and expected output. When execution is required in this Codex runtime, route every tool call through js_repl with codex.tool(...), prefer direct command invocation inside exec_command, and avoid wrapping ordinary commands in powershell.exe -NoProfile -Command unless PowerShell-specific semantics are required. If the task is analysis-only, stay analytical until execution is necessary. The main agent performs final validation and integration."
policy:
  allow_implicit_invocation: true
