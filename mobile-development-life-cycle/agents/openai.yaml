# Reasoning: This skill is implementation-heavy, so keep reasoning at `high`
# for app code, build configuration, test flows, and staged release wiring in the workspace.
reasoning_effort: "high"
interface:
  display_name: "Mobile Development Life Cycle"
  short_description: "Mobile implementation, lifecycle quality, and release guidance"
  default_prompt: "Use $mobile-development-life-cycle for implementation-heavy mobile work involving lifecycle behavior, permissions, offline sync, testing, crash evidence, and staged release safety. Always research current external information before trusting internal knowledge, and continue the 3-round research loop until the result is actionable rather than generic. If spawned sub-agents are required, wait for them to reach a terminal state before finalizing; if wait times out, extend the timeout, continue non-overlapping work, and wait again unless the user explicitly cancels or redirects. Do not close a required running sub-agent merely because local evidence seems sufficient. Within the same project or workstream, keep at most one live same-role agent by default and reuse it when possible via send_input or resume_agent instead of spawning duplicates, and keep fork_context off unless the exact parent thread history is required. When execution is required in this Codex runtime, route every tool call through js_repl with codex.tool(...), prefer direct command invocation inside exec_command, and avoid wrapping ordinary commands in powershell.exe -NoProfile -Command unless PowerShell-specific semantics are required. If the task is analysis-only, stay analytical until execution is necessary. The main agent performs final validation and integration."
policy:
  allow_implicit_invocation: true
