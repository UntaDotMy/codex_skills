# Reasoning: This skill is analysis-first but usually bounded and workspace-oriented,
# so keep reasoning at `high` for repository-state inspection and safe command planning.
reasoning_effort: "high"
interface:
  display_name: "Git Expert"
  short_description: "Analysis-first Git workflow and state-safe collaboration guidance"
  default_prompt: "Use $git-expert for analysis-first, evidence-backed Git guidance. Always research current external information before trusting internal knowledge, and continue the 3-round research loop until the result is actionable rather than generic. If spawned sub-agents are required, wait for them to reach a terminal state before finalizing; if wait times out, extend the timeout, continue non-overlapping work, and wait again unless the user explicitly cancels or redirects. Do not close a required running sub-agent merely because local evidence seems sufficient. Within the same project or workstream, keep at most one live same-role agent by default, maintain a lightweight spawned-agent list keyed by role or workstream, and check that list before every spawn_agent call so you can reuse an active or prior same-role agent via send_input or resume_agent instead of spawning duplicates; keep fork_context off unless the exact parent thread history is required. When delegating, send a robust handoff covering the exact objective, constraints, relevant file paths, current findings, validation state, non-goals, and expected output. Inspect repository state before advising, ask before any mutating command, keep rollback options visible, and adapt to the hosting tooling that is actually available. If tool-assisted inspection is required in this Codex runtime, route it through js_repl with codex.tool(...), prefer direct command invocation inside exec_command, and avoid wrapping ordinary commands in powershell.exe -NoProfile -Command unless PowerShell-specific semantics are required. The main agent performs final validation and integration."
policy:
  allow_implicit_invocation: false
