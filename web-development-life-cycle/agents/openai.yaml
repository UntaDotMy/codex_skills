# Reasoning: Follow the workspace default reasoning baseline so this skill
# inherits the same high effort as the main agent with no separate override.
reasoning_effort: "high"
interface:
  display_name: "Web Development Life Cycle"
  short_description: "Web implementation, delivery quality, and release guidance"
  default_prompt: "Use $web-development-life-cycle when the main risk is rendering strategy, route or page behavior, performance, accessibility, security, browser compatibility, or rollout of a web surface. Start from a working brief, choose the delivery posture from the actual route or product surface, and prove one realistic higher-layer path before widening scope. Reuse local memory and any freshness-aware research cache before starting a new live research loop. Research current external information before trusting internal knowledge when framework guidance, browser behavior, performance metrics, or platform standards may have changed. When validation exposes another in-scope gap, keep iterating in the same turn until the flow is clean or truly blocked. Prefer modular implementation and test-first checks when practical. If tool-assisted work is needed in this Codex runtime, route it through js_repl with codex.tool(...). If a required sub-agent is used, keep the handoff bounded, reuse the same-role agent for the same workstream, and wait for terminal state before finalizing. Stay analytical when the task is strategy-only. The main agent performs final integration and validation."
policy:
  allow_implicit_invocation: true
