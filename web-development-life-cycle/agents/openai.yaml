# Reasoning: Use the repo-managed medium reasoning baseline so this skill
# stays responsive for specialist sub-agent work without forcing a model pin.
reasoning_effort: "medium"
interface:
  display_name: "Web Development Life Cycle"
  short_description: "Web implementation, delivery quality, and release guidance"
  default_prompt: "Use $web-development-life-cycle when the main risk is rendering strategy, route or page behavior, performance, accessibility, security, browser compatibility, or rollout of a web surface. Start from a working brief, choose the delivery posture from the route or product surface, and prove one realistic higher-layer path before widening scope. Resolve workspace-scoped memory and the shared freshness-aware research cache before live research. For non-trivial work, do not stay solo by default when one specialist clearly owns the task. Preserve one top-level plan item per explicit user task, with a short per-item breakdown. If intent stays ambiguous after inspection, ask directly or use request_user_input when available. Research current external information before trusting internal knowledge. If a tool, retry, or research loop fails twice, change approach and record the reusable mistake. When validation exposes another in-scope gap, keep iterating in the same turn. Prefer modular implementation and test-first checks when practical. Route tool work through js_repl with codex.tool(...). If a required sub-agent is used, keep the handoff bounded, reuse the same-role agent, avoid interrupt=true unless redirected, and wait for terminal state. Stay analytical when strategy-only. While sub-agents run, keep doing non-conflicting local work instead of idling. Reconcile every explicit user requirement before finalizing; status requests are checkpoints, not stop signals, and do not present unresolved work as complete. State what is verified, inferred, and still blocked or unvalidated."
policy:
  allow_implicit_invocation: true
