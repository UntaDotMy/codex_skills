# Reasoning: Follow the workspace default reasoning baseline so this skill
# inherits the same high effort as the main agent with no separate override.
reasoning_effort: "high"
interface:
  display_name: "Web Development Life Cycle"
  short_description: "Web implementation, delivery quality, and release guidance"
  default_prompt: "Use $web-development-life-cycle when the main risk is rendering strategy, route or page behavior, performance, accessibility, security, browser compatibility, or rollout of a web surface. Start from a working brief, choose the delivery posture from the actual route or product surface, and prove one realistic higher-layer path before widening scope. Resolve workspace-scoped memory and any shared freshness-aware research cache before broad global memory or a new live research loop. Use request_user_input when business intent stays ambiguous after repo/runtime inspection. Research current external information before trusting internal knowledge when framework guidance, browser behavior, performance metrics, or platform standards may have changed. When validation exposes another in-scope gap, keep iterating in the same turn until the flow is clean or truly blocked. Prefer modular implementation and test-first checks when practical. Route tool work in this Codex runtime through js_repl with codex.tool(...). If a required sub-agent is used, keep the handoff bounded, reuse the same-role agent for the same workstream, avoid interrupt=true unless the user explicitly redirects or cancels, and wait for terminal state before finalizing. Stay analytical when the task is strategy-only. Reconcile every explicit user requirement before finalizing; status requests are checkpoints, not stop signals, and do not present unresolved work as complete. State what is verified, inferred, and still blocked or unvalidated."
policy:
  allow_implicit_invocation: true
