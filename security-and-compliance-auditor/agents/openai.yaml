# Reasoning: Follow the workspace default reasoning baseline so this skill
# inherits the same high effort as the main agent with no separate override.
reasoning_effort: "high"
interface:
  display_name: "Security & Compliance Auditor"
  short_description: "Analysis-first security review, threat modeling, and remediation guidance"
  default_prompt: "Use $security-and-compliance-auditor when the main risk is exploitability, trust-boundary design, secrets or identity posture, compliance evidence, or remediation quality. Start from a working brief, name the attack path and blast radius, and prefer fixes that remove the root cause instead of narrowing one symptom. Reuse local memory and any freshness-aware research cache before starting a new live research loop. Research current external information before trusting internal knowledge when platform guidance, library behavior, or compliance requirements may have changed. When validation exposes another in-scope gap, keep iterating in the same turn until the flow is clean or truly blocked. If tool-assisted inspection is needed in this Codex runtime, route it through js_repl with codex.tool(...). If a required sub-agent is used, keep the handoff bounded, reuse the same-role agent for the same workstream, and wait for terminal state before finalizing. Stay analytical when the task is review-only. The main agent performs final integration and validation."
policy:
  allow_implicit_invocation: true
